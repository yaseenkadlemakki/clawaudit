---
name: Test Suite

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Least-privilege: workflow only reads repository contents.
permissions:
  contents: read

# Cancel in-progress runs on the same branch when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. YAML lint ──────────────────────────────────────────────────────────────
  lint-yaml:
    name: Lint YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306  # v5.0.3
        with:
          path: ~/.cache/pip
          key: pip-lint-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: pip-lint-

      - name: Install yamllint
        run: pip install yamllint==1.35.1

      - name: Lint YAML files
        run: |
          yamllint -d "{
            extends: default,
            rules: {
              line-length: {max: 200},
              truthy: disable,
              comments: disable
            }
          }" data/hardening-rules.yaml .github/workflows/

  # ── 2. Unit tests (matrix: Python 3.10 / 3.11 / 3.12) ───────────────────────
  unit-tests:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint-yaml
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306  # v5.0.3
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.python-version }}-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: pip-${{ matrix.python-version }}-

      - name: Install test dependencies
        run: pip install -r requirements-dev.txt

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short -m unit

  # ── 3. Functional tests (Python 3.12) ────────────────────────────────────────
  functional-tests:
    name: Functional tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306  # v5.0.3
        with:
          path: ~/.cache/pip
          key: pip-3.12-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: pip-3.12-

      - name: Install test dependencies
        run: pip install -r requirements-dev.txt

      - name: Run functional tests
        run: pytest tests/functional/ -v --tb=short -m functional

  # ── 4. Integration + regression tests (Python 3.12, fail-fast) ───────────────
  integration-tests:
    name: Integration & regression tests
    runs-on: ubuntu-latest
    needs: unit-tests  # runs in parallel with functional-tests after unit-tests

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306  # v5.0.3
        with:
          path: ~/.cache/pip
          key: pip-3.12-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: pip-3.12-

      - name: Install test dependencies
        run: pip install -r requirements-dev.txt

      - name: Run integration tests
        # -x: stop on first failure — regression failures are hard blockers
        run: pytest tests/integration/ -v --tb=long -m integration -x

  # ── 5. Full suite with coverage (Python 3.12) ────────────────────────────────
  coverage:
    name: Test coverage
    runs-on: ubuntu-latest
    needs: [unit-tests, functional-tests, integration-tests]
    permissions:
      contents: read   # inherited from workflow-level
      actions: write   # required for actions/upload-artifact@v4

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306  # v5.0.3
        with:
          path: ~/.cache/pip
          key: pip-3.12-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: pip-3.12-

      - name: Install test dependencies
        run: pip install -r requirements-dev.txt

      - name: Run full suite with coverage
        run: |
          pytest tests/ \
            --cov=sentinel --cov=backend \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-fail-under=80 \
            -v

      - name: Upload coverage report (HTML)
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        if: always()
        with:
          name: coverage-html
          path: htmlcov/
          retention-days: 14

      - name: Upload coverage XML (for external tools)
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14

  # ── 6. Backend API tests (Python 3.12, SQLAlchemy async) ─────────────────────
  backend-tests:
    name: Backend API tests
    runs-on: ubuntu-latest
    needs: lint-yaml

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306  # v5.0.3
        with:
          path: ~/.cache/pip
          key: pip-backend-3.12-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-backend-3.12-

      - name: Install backend and dev dependencies
        run: pip install -e ".[backend,dev]"

      - name: Run backend tests
        run: pytest tests/backend/ -v --tb=short

  # ── 7. Sentinel tests (Python 3.11+, asyncio) ────────────────────────────────
  sentinel-tests:
    name: Sentinel tests
    runs-on: ubuntu-latest
    needs: lint-yaml

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306  # v5.0.3
        with:
          path: ~/.cache/pip
          key: pip-sentinel-3.11-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-sentinel-3.11-

      - name: Install Sentinel and dev dependencies
        run: pip install -e ".[dev]"

      - name: Run Sentinel unit tests
        run: |
          pytest \
            tests/unit/test_config_auditor.py \
            tests/unit/test_injection_detector.py \
            tests/unit/test_policy_engine.py \
            tests/unit/test_secret_scanner.py \
            tests/unit/test_skill_analyzer.py \
            -v --tb=short

      - name: Run Sentinel integration tests
        run: pytest tests/integration/test_collector_pipeline.py -v --tb=short

  # ── 8. Shell script tests (Linux + macOS) ────────────────────────────────────
  shell-script-tests:
    name: Shell script tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint-yaml
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Shell syntax check
        run: bash -n start.sh stop.sh

      - name: Cache pip
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306  # v5.0.3
        with:
          path: ~/.cache/pip
          key: pip-shell-${{ matrix.os }}-3.12-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: pip-shell-${{ matrix.os }}-3.12-

      - name: Install test dependencies
        run: pip install -r requirements-dev.txt

      - name: Run shell script tests
        run: |
          pytest \
            tests/unit/test_start_stop_scripts.py \
            tests/functional/test_start_stop_functional.py \
            tests/integration/test_start_stop_integration.py \
            -v --tb=short

  # ── 9. Playwright E2E tests ─────────────────────────────────────────────────
  playwright-e2e:
    name: Playwright E2E tests
    runs-on: ubuntu-latest
    needs: lint-yaml

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run Playwright tests
        working-directory: frontend
        run: npx playwright test --reporter=list
        env:
          CI: "true"

      - name: Upload Playwright report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        if: failure()
        with:
          name: playwright-report
          path: frontend/test-results/
          retention-days: 7

  # ── 10. Final status gate ─────────────────────────────────────────────────────
  # All required jobs must pass before a PR can be merged.
  # IMPORTANT: Update the needs list and result checks whenever a new required job is added.
  all-tests-pass:
    name: All tests passed
    runs-on: ubuntu-latest
    needs: [lint-yaml, unit-tests, functional-tests, integration-tests, coverage, sentinel-tests, backend-tests, shell-script-tests, playwright-e2e]
    if: always()
    steps:
      - name: Check all jobs succeeded
        run: |
          if [[ "${{ needs.lint-yaml.result }}" != "success" ||
                "${{ needs.unit-tests.result }}" != "success" ||
                "${{ needs.functional-tests.result }}" != "success" ||
                "${{ needs.integration-tests.result }}" != "success" ||
                "${{ needs.coverage.result }}" != "success" ||
                "${{ needs.sentinel-tests.result }}" != "success" ||
                "${{ needs.backend-tests.result }}" != "success" ||
                "${{ needs.shell-script-tests.result }}" != "success" ||
                "${{ needs.playwright-e2e.result }}" != "success" ]]; then
            echo "One or more required jobs failed."
            exit 1
          fi
          echo "All jobs passed."
