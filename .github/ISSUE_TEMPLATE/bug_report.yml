name: Bug Report
description: Report a bug or unexpected behavior in ClawAudit
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug! Please fill in as much detail as possible.
        
        > **Security vulnerabilities** — do NOT use this form. See [SECURITY.md](../SECURITY.md) for responsible disclosure.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: When I do X, Y happens instead of Z.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Start ClawAudit with `docker compose up`
        2. Navigate to `/findings`
        3. Click on '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include error messages if any.
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment method
      options:
        - Docker Compose
        - Local (pip install)
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: ClawAudit version
      description: Run `sentinel --version` or check the dashboard footer.
      placeholder: "e.g. v0.4.0"
    validations:
      required: true

  - type: input
    id: python_version
    attributes:
      label: Python version
      description: Run `python --version`
      placeholder: "e.g. 3.11.8"

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. macOS 14.4, Ubuntu 22.04, Windows 11"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant log output here. Backend logs, browser console errors, etc.
      render: shell
      placeholder: Paste logs here...
