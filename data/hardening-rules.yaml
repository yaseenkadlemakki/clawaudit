# ClawAudit — Hardening Rules Registry
# Canonical check definitions. Each check has: id, domain, description, evidence_key, expected, severity, remediation.

version: "1.0.0"

checks:

  # ── Domain 1: Configuration ──────────────────────────────────────────────

  - id: CONF-01
    domain: config
    description: Debug mode disabled in production config
    evidence_key: "config.debug"
    expected: "absent or false"
    severity: MEDIUM
    remediation: "Set `debug: false` explicitly in openclaw.json or remove the key (defaults to false)."

  - id: CONF-02
    domain: config
    description: API endpoint bound to localhost only
    evidence_key: "config.gateway.bind"
    expected: '"loopback" or "127.0.0.1"'
    severity: CRITICAL
    remediation: "Set gateway.bind to \"loopback\" in openclaw.json. Never bind to \"0.0.0.0\" without TLS + auth."

  - id: CONF-03
    domain: config
    description: Authentication required to invoke agent via API/webhook
    evidence_key: "config.gateway.auth.mode"
    expected: '"token" or "oauth"'
    severity: CRITICAL
    remediation: "Set gateway.auth.mode to \"token\" and ensure gateway.auth.token is a strong random value."

  - id: CONF-04
    domain: config
    description: max_steps or max_tokens limit defined to prevent runaway agents
    evidence_key: "config.agents.defaults.maxSteps OR config.agents.defaults.maxTokens"
    expected: "at least one present and > 0"
    severity: HIGH
    remediation: "Add `agents.defaults.maxSteps: 50` and/or `agents.defaults.maxTokens: 100000` to openclaw.json."

  - id: CONF-05
    domain: config
    description: Logging enabled and directed to persistent path
    evidence_key: "config.hooks.internal.entries.command-logger.enabled"
    expected: "true"
    severity: HIGH
    remediation: "Set hooks.internal.entries.command-logger.enabled to true. Configure an external log destination."

  - id: CONF-06
    domain: config
    description: Human-in-the-loop gate for destructive actions
    evidence_key: "config.agents.defaults.humanGate OR config.agents.defaults.requireConfirmation"
    expected: "present"
    severity: HIGH
    remediation: "Enable a HITL gate in agents.defaults. Require explicit confirmation for exec, file deletion, and external sends."

  - id: CONF-07
    domain: config
    description: Skill execution timeouts defined
    evidence_key: "config.agents.defaults.skillTimeoutSeconds"
    expected: "present and > 0"
    severity: MEDIUM
    remediation: "Add `agents.defaults.skillTimeoutSeconds: 300` (5 min default) to openclaw.json."

  - id: CONF-08
    domain: config
    description: Allowed models list restricts LLM backends
    evidence_key: "config.agents.defaults.allowedModels"
    expected: "present and non-empty array"
    severity: HIGH
    remediation: "Add `agents.defaults.allowedModels: [\"anthropic/*\"]` to restrict to known-safe providers."

  # ── Domain 2: Skill Permissions ──────────────────────────────────────────

  - id: SKILL-01
    domain: skills
    description: Skill declares explicit allowed-tools list
    evidence_key: "frontmatter.allowed-tools"
    expected: "present and non-empty"
    severity: MEDIUM
    remediation: "Add `allowed-tools: [...]` to skill frontmatter listing only tools the skill legitimately needs."

  - id: SKILL-02
    domain: skills
    description: Shell/exec access declared and justified
    evidence_key: "body mentions exec/bash/shell"
    expected: "absent or explicitly scoped"
    severity: HIGH
    remediation: "If shell access is required, document justification in skill. Add exec to allowed-tools. Gate --yolo to owner sessions."

  - id: SKILL-03
    domain: skills
    description: No filesystem access outside declared working directory
    evidence_key: "body path references"
    expected: "paths within workspace or explicitly declared"
    severity: MEDIUM
    remediation: "Restrict file operations to workspace. Document any cross-directory access explicitly."

  - id: SKILL-04
    domain: skills
    description: Outbound HTTP calls — list all external domains
    evidence_key: "body HTTP call patterns"
    expected: "all domains declared"
    severity: LOW
    remediation: "Document all external domains contacted. Add to egress allowlist."

  - id: SKILL-05
    domain: skills
    description: Raw user input not passed to shell without sanitization
    evidence_key: "body injection patterns"
    expected: "no unsanitized interpolation"
    severity: HIGH
    remediation: "Validate all user-supplied arguments before shell interpolation. Use regex allowlists for repo names, branch names, etc."

  - id: SKILL-06
    domain: skills
    description: Skill does not invoke undeclared skills
    evidence_key: "body skill invocation patterns"
    expected: "no undeclared cross-skill calls"
    severity: MEDIUM
    remediation: "Declare all skill dependencies in frontmatter. Avoid implicit skill chaining."

  - id: SKILL-07
    domain: skills
    description: Skill pinned to specific version
    evidence_key: "frontmatter version or hash"
    expected: "present"
    severity: LOW
    remediation: "Add version field to skill frontmatter. For npm-bundled skills, verify via package-lock.json."

  - id: SKILL-08
    domain: skills
    description: Skill cryptographically signed
    evidence_key: "frontmatter signature"
    expected: "present and verified"
    severity: MEDIUM
    remediation: "Implement skill signing (upstream OpenClaw feature). Until then, verify skill integrity via SHA256 manifest."

  - id: SKILL-09
    domain: skills
    description: Skill has declared author and verifiable source
    evidence_key: "frontmatter metadata.author or homepage"
    expected: "present"
    severity: LOW
    remediation: "Add author and homepage/repository fields to skill frontmatter metadata."

  - id: SKILL-10
    domain: skills
    description: Skill does not store/log external data without disclosure
    evidence_key: "body data persistence patterns"
    expected: "no undisclosed external data storage"
    severity: LOW
    remediation: "Document any persistence of external data. Ensure log locations are access-controlled."

  # ── Domain 3: Secrets Hygiene ─────────────────────────────────────────────

  - id: SEC-01
    domain: secrets
    description: No hardcoded API keys in skill files or config
    evidence_key: "all string values in scanned files"
    expected: "no credential pattern matches (or all masked)"
    severity: CRITICAL
    remediation: "Remove hardcoded credentials. Move to environment variables or secrets manager. Rotate any exposed keys immediately."

  - id: SEC-02
    domain: secrets
    description: Secrets passed as env vars or secrets manager, not embedded in YAML/JSON
    evidence_key: "config structure"
    expected: "secret values are env var references or masked"
    severity: HIGH
    remediation: "Use `${ENV_VAR}` references in config rather than literal values. Or integrate with macOS Keychain / Vault."

  - id: SEC-03
    domain: secrets
    description: Secrets manager integration present
    evidence_key: "config keys: vault, keychain, doppler, aws_secrets"
    expected: "any secrets manager integration found"
    severity: HIGH
    remediation: "Integrate macOS Keychain (local) or HashiCorp Vault (enterprise) for credential storage."

  - id: SEC-04
    domain: secrets
    description: Log masking/redaction configured
    evidence_key: "config.logging.redact or similar"
    expected: "present"
    severity: HIGH
    remediation: "Configure log redaction patterns to mask credential values before writing to logs."

  - id: SEC-05
    domain: secrets
    description: API keys scoped with least privilege
    evidence_key: "cannot verify from config alone — UNKNOWN unless documented"
    expected: "documented scope"
    severity: MEDIUM
    remediation: "Audit each API key's permission scope. Use read-only or minimal-scope keys where possible."

  - id: SEC-06
    domain: secrets
    description: Key rotation policy or TTL defined
    evidence_key: "config.auth.*.ttl or documented rotation policy"
    expected: "present"
    severity: LOW
    remediation: "Define a key rotation schedule. Consider short-lived tokens where the provider supports it."

  # ── Domain 4: Network Exposure ────────────────────────────────────────────

  - id: NET-01
    domain: network
    description: Agent runtime not accessible on public IP
    evidence_key: "config.gateway.bind + config.gateway.mode"
    expected: 'bind=loopback, mode=local'
    severity: CRITICAL
    remediation: "Set gateway.bind to loopback and mode to local. Use Tailscale for remote access instead of public binding."

  - id: NET-02
    domain: network
    description: TLS enforced for inbound API connections
    evidence_key: "config.gateway.tls"
    expected: "present if bind != loopback"
    severity: HIGH
    remediation: "If gateway is exposed beyond localhost, configure TLS. Otherwise, keep bind=loopback (TLS not required for loopback-only)."

  - id: NET-03
    domain: network
    description: Egress allowlist for external domain calls from skills
    evidence_key: "config.agents.defaults.egressAllowlist or equivalent"
    expected: "present and non-empty"
    severity: HIGH
    remediation: "Add egressAllowlist to agents.defaults: [\"api.github.com\", \"wttr.in\"]. Block all other outbound from skill context."

  - id: NET-04
    domain: network
    description: Webhook endpoints protected with HMAC signature verification
    evidence_key: "config.gateway.webhooks.*.hmac"
    expected: "present if webhooks configured"
    severity: HIGH
    remediation: "Enable HMAC verification for all webhook endpoints. Reject requests with invalid signatures."

  - id: NET-05
    domain: network
    description: Rate limiting on agent invocation API
    evidence_key: "config.gateway.rateLimit"
    expected: "present"
    severity: MEDIUM
    remediation: "Add gateway.rateLimit configuration to prevent abuse. Suggested: 60 requests/minute per token."

  - id: NET-06
    domain: network
    description: DNS lookups from skills restricted or monitored
    evidence_key: "any DNS filter config"
    expected: "present"
    severity: LOW
    remediation: "Consider a local DNS resolver (like Pi-hole or dnsmasq) with allowlist for agent-spawned processes."

  - id: NET-07
    domain: network
    description: Skill execution isolated from host network
    evidence_key: "container / namespace / sandbox config"
    expected: "present"
    severity: MEDIUM
    remediation: "Run OpenClaw skills inside a container or macOS sandbox profile to isolate network access."

  # ── Domain 5: Supply Chain ────────────────────────────────────────────────

  - id: SC-01
    domain: supply_chain
    description: Record skill name, version, publisher, source URL
    evidence_key: "skill frontmatter metadata"
    expected: "all four fields present"
    severity: INFO
    remediation: "Add version, author, and homepage to all skill frontmatter entries."

  - id: SC-02
    domain: supply_chain
    description: Publisher has established verifiable identity
    evidence_key: "frontmatter metadata.author"
    expected: "recognized org or profile"
    severity: LOW
    remediation: "Prefer skills from established publishers. Avoid skills from anonymous or single-skill accounts."

  - id: SC-03
    domain: supply_chain
    description: Source repo has recent commits (not abandoned)
    evidence_key: "repo last commit date — requires web check"
    expected: "commit within last 12 months"
    severity: LOW
    remediation: "Flag skills with abandoned repos. Consider forking or replacing with maintained alternatives."

  - id: SC-04
    domain: supply_chain
    description: Skill pinned to version hash (not floating)
    evidence_key: "frontmatter version or lock file hash"
    expected: "hash present"
    severity: MEDIUM
    remediation: "Pin skills to specific commit SHAs or content hashes. Track in a skills.lock file."

  - id: SC-05
    domain: supply_chain
    description: Source repository not deleted or private
    evidence_key: "repo availability — requires web check"
    expected: "publicly accessible"
    severity: HIGH
    remediation: "Maintain local copies of critical skills. Flag any skill whose source is inaccessible."

  - id: SC-06
    domain: supply_chain
    description: External dependencies without pinned versions flagged
    evidence_key: "skill scripts/ directory — package.json, requirements.txt"
    expected: "all deps pinned"
    severity: MEDIUM
    remediation: "Pin all npm/pip dependencies in skill scripts to exact versions. Use lockfiles."

  - id: SC-07
    domain: supply_chain
    description: Skill does not call home to undeclared endpoint on first load
    evidence_key: "skill SKILL.md body — initialization patterns"
    expected: "no undeclared external calls on load"
    severity: HIGH
    remediation: "Review all skills for network calls that occur during initialization. Require explicit declaration."

  # ── Domain 6: Audit Logging ───────────────────────────────────────────────

  - id: OBS-01
    domain: observability
    description: Every skill invocation logged with timestamp + skill + user
    evidence_key: "config.hooks.internal.entries.command-logger.enabled"
    expected: "true"
    severity: HIGH
    remediation: "Enable command-logger hook. Ensure it captures: timestamp, skill name, invoking session/user."

  - id: OBS-02
    domain: observability
    description: Logs tamper-evident or shipped to external SIEM
    evidence_key: "config log destination — external SIEM or append-only"
    expected: "external destination or append-only flag"
    severity: HIGH
    remediation: "Configure log shipping to an external destination (syslog, S3, Loki). Or set append-only ACL on log directory."

  - id: OBS-03
    domain: observability
    description: Alerting on repeated failures or anomalous invocations
    evidence_key: "config.hooks or alerting config"
    expected: "present"
    severity: MEDIUM
    remediation: "Set up anomaly alerting (e.g., >10 skill failures in 5 min triggers notification). Use OpenClaw cron for periodic log review."

  - id: OBS-04
    domain: observability
    description: Mechanism to replay or reconstruct agent decision chain
    evidence_key: "session JSONL files — completeness"
    expected: "full session transcripts retained with tool calls"
    severity: MEDIUM
    remediation: "Ensure session JSONL files are retained and include tool calls. Use sessions_history to reconstruct decisions."

  - id: OBS-05
    domain: observability
    description: Audit log retention policy defined
    evidence_key: "config log retention settings"
    expected: "retention period defined (suggested: 90 days)"
    severity: LOW
    remediation: "Define and document log retention policy. Configure automated archiving or deletion after retention period."
